name: DevOps CI/CD
on:
  push:
    branches: [ main ]
    # 提交main自动触发
  workflow_dispatch:
    # 支持网页手动一键运行流水线
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取源码
        uses: actions/checkout@v4
      - name: 配置Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: 安装依赖+单元测试
        run: |
          pip install flask pytest
          pytest test_app.py
      - name: 登录DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: 构建&推送镜像
        run: |
          SHA=$(git rev-parse --short HEAD)
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/se-web-app:latest .
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/se-web-app:latest ${{ secrets.DOCKERHUB_USERNAME }}/se-web-app:${SHA}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/se-web-app:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/se-web-app:${SHA}
